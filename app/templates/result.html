<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노후 주택 판정 AI 시스템 - 결과</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f6f7;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: #ffffff;
            border: 1px solid #e1e4e6;
            border-radius: 8px;
            padding: 60px 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 50px;
            font-weight: 500;
            letter-spacing: -0.5px;
        }

        /* 초기화 버튼 */
        .reset-btn {
            position: absolute;
            top: 65px;
            right: 40px;
            background: #e5e5ea;
            color: #333;
            border: none;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 500;
        }
        .reset-btn:hover {
            background: #d1d1d6;
        }

        /* 나란히 배치되는 두 개의 상자 영역 */
        .result-container {
            display: flex;
            justify-content: space-between;
            gap: 25px;
            margin-bottom: 60px;
        }

        .preview-box, .analysis-box {
            flex: 1;
            border: 1px solid #dee2e6;
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fafbfc;
            position: relative;
        }

        /* 사용자가 업로드한 이미지가 꽉 차게 표시되는 스타일 */
        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .img-placeholder-text {
            font-size: 13px;
            color: #8b95a1;
        }

        /* 하단 캡션 라벨 (제공된 이미지 / 판정 : 노후) */
        .result-label {
            position: absolute;
            bottom: -30px;
            left: 0;
            width: 100%;
            font-size: 15px;
            color: #333;
            font-weight: 500;
            text-align: center;
        }

        /* 판정 결과 글씨 강조 */
        .status-text {
            font-size: 24px;
            font-weight: bold;
            color: #ff4d4f; /* 노후 상태를 알리는 빨간색 기조 */
        }

        .footer-notice {
            font-size: 12px;
            color: #4e5968;
            line-height: 1.6;
            margin-top: 50px;
        }
    </style>
</head>
<body>

  <div class="container">
    <!-- 초기화 버튼 -->
    <button class="reset-btn" onclick="location.href='/'">초기화</button>
    <h1>노후 주택 판정기</h1>

    <!-- 1. 상단: 판정 결과 (가운데 정렬) -->
    <div class="final-status-container">
        <div class="status-title">판정 결과</div>
        <div class="status-text">{{ ai_result }}</div>
    </div>
    <br>
    <br>

    <!-- 2. 하단: 이미지 2개 구역 (원본사진 | 결과사진) -->
    <div class="result-container">
        <!-- 왼쪽: 원본 이미지 -->
        <div class="preview-box">
            <img src="{{ user_image_url }}" alt="원본 이미지">
            <div class="result-label">원본 사진</div>
        </div>

        <!-- 오른쪽: 결과 이미지 (CAM 시각화 등) -->
        <div class="preview-box">
            <!-- 💡 서버에서 결과 이미지 경로 변수명(예: cam_image_url)을 맞춰서 넣어주세요 -->
            <img src="{{ cam_image_url }}" alt="결과 이미지">
            <div class="result-label">결과 사진</div>
        </div>
    </div>

    <p class="footer-notice">**이 모델은 AI-HUB 에 올라와있는 '서울시 노후 주택 균열 데이터'로 학습시켰습니다.**</p>
    <p class="footer-notice">** 이 모델은 이런 원리로 판별하고 있습니다. AI는 오류가 있을 수 있습니다. **</p>
  </div>

</body>
</html>
